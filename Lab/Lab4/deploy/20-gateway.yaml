apiVersion: v1
kind: Service
metadata:
  name: lab4-gateway
  namespace: lab4
  labels:
    app: lab4-gateway
spec:
  type: NodePort
  ports:
    - name: game
      port: 9310
      targetPort: game
      nodePort: 30910
    - name: health
      port: 9311
      targetPort: health
  selector:
    app: lab4-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab4-gateway
  namespace: lab4
  labels:
    app: lab4-gateway
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: lab4-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: lab4-gateway
    spec:
      serviceAccountName: lab4-game
      terminationGracePeriodSeconds: 45
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: lab4-gateway
      containers:
        - name: gateway
          image: lab4-gateway:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: game
              containerPort: 9310
            - name: health
              containerPort: 9311
          env:
            - name: LAB4_GATEWAY_ADDR
              value: "0.0.0.0:9310"
            - name: LAB4_GATEWAY_HEALTH_ADDR
              value: "0.0.0.0:9311"
            - name: LAB4_COORDINATOR_URL
              value: "http://lab4-coordinator:9320"
            - name: LAB4_NAMESPACE
              value: "lab4"
            - name: LAB4_COMPONENT
              value: "gateway"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "wget -qO- http://127.0.0.1:9311/drain >/dev/null 2>&1 || true; sleep 5"
          readinessProbe:
            tcpSocket:
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: health
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 80m
              memory: 64Mi
            limits:
              cpu: 600m
              memory: 256Mi
