apiVersion: v1
kind: Namespace
metadata:
  name: lab4
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lab4-game
  namespace: lab4
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lab4-game-pod-manager
  namespace: lab4
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lab4-game-pod-manager
  namespace: lab4
subjects:
  - kind: ServiceAccount
    name: lab4-game
    namespace: lab4
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lab4-game-pod-manager
