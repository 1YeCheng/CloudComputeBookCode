apiVersion: v1
kind: Service
metadata:
  name: lab4-redis
  namespace: lab4
  labels:
    app: lab4-redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app: lab4-redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lab4-redis
  namespace: lab4
  labels:
    app: lab4-redis
spec:
  serviceName: lab4-redis
  replicas: 1
  selector:
    matchLabels:
      app: lab4-redis
  template:
    metadata:
      labels:
        app: lab4-redis
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --save
            - "60"
            - "1"
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
