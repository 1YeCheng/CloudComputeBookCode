apiVersion: v1
kind: Service
metadata:
  name: lab4-coordinator
  namespace: lab4
  labels:
    app: lab4-coordinator
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9320
      targetPort: http
  selector:
    app: lab4-coordinator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab4-coordinator
  namespace: lab4
  labels:
    app: lab4-coordinator
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: lab4-coordinator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: lab4-coordinator
    spec:
      serviceAccountName: lab4-game
      terminationGracePeriodSeconds: 45
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: lab4-coordinator
      containers:
        - name: coordinator
          image: lab4-coordinator:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9320
          env:
            - name: LAB4_COORDINATOR_ADDR
              value: ":9320"
            - name: LAB4_STATE_BACKEND
              value: "redis"
            - name: LAB4_REDIS_ADDR
              value: "lab4-redis:6379"
            - name: LAB4_REDIS_PREFIX
              value: "lab4"
            - name: LAB4_GREEN_URL
              value: "http://lab4-map-green:9400"
            - name: LAB4_CAVE_URL
              value: "http://lab4-map-cave:9400"
            - name: LAB4_RUINS_URL
              value: "http://lab4-map-ruins:9400"
            - name: LAB4_GREEN_NODE_ID
              value: "map-green"
            - name: LAB4_CAVE_NODE_ID
              value: "map-cave"
            - name: LAB4_RUINS_NODE_ID
              value: "map-ruins"
            - name: LAB4_NAMESPACE
              value: "lab4"
            - name: LAB4_COMPONENT
              value: "coordinator"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "wget -qO- http://127.0.0.1:9320/drain >/dev/null 2>&1 || true; sleep 5"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 700m
              memory: 512Mi
