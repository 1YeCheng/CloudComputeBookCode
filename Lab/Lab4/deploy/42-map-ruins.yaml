apiVersion: v1
kind: Service
metadata:
  name: lab4-map-ruins
  namespace: lab4
  labels:
    app: lab4-map-ruins
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9400
      targetPort: http
  selector:
    app: lab4-map-ruins
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab4-map-ruins
  namespace: lab4
  labels:
    app: lab4-map-ruins
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: lab4-map-ruins
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: lab4-map-ruins
    spec:
      serviceAccountName: lab4-game
      terminationGracePeriodSeconds: 45
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: lab4-map-ruins
      containers:
        - name: map
          image: lab4-map:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9400
          env:
            - name: LAB4_MAP_LISTEN_ADDR
              value: ":9400"
            - name: LAB4_STATE_BACKEND
              value: "redis"
            - name: LAB4_REDIS_ADDR
              value: "lab4-redis:6379"
            - name: LAB4_REDIS_PREFIX
              value: "lab4"
            - name: LAB4_MAP_ID
              value: "ruins"
            - name: LAB4_NODE_ID
              value: "map-ruins"
            - name: LAB4_COMPONENT
              value: "map-ruins"
            - name: LAB4_NAMESPACE
              value: "lab4"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "wget -qO- http://127.0.0.1:9400/drain >/dev/null 2>&1 || true; sleep 5"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 80m
              memory: 64Mi
            limits:
              cpu: 600m
              memory: 256Mi
